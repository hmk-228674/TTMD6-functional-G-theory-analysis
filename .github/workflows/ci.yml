name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  repository-contract:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Compile Python sources
        run: python -m compileall -q reproduce_all.py scripts tests
      - name: Run data-free tests
        run: python -m unittest discover -s tests -v
      - name: Verify release contract
        run: python scripts/check_repository_release.py

  locked-environment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - name: Install locked dependencies
        run: python -m pip install -r requirements-lock.txt
      - name: Compile Python sources
        run: python -m compileall -q reproduce_all.py scripts tests
      - name: Run data-free tests
        run: python -m unittest discover -s tests -v
      - name: Verify release contract
        run: python scripts/check_repository_release.py
