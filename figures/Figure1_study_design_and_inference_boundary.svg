   </g>
   <g id="text_11">
    <text style="font-weight: 700; font-size: 7.8px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; text-anchor: start" x="41.158656" y="245.882493" transform="rotate(-0 41.158656 245.882493)">Uncertainty, assumptions, and inferential boundary</text>
   </g>
   <g id="text_12">
    <text style="font-size: 6.85px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif" transform="translate(41.158656 264.036519)">Left: 5,000 whole-athlete bootstrap replicates;</text>
    <text style="font-size: 6.85px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif" transform="translate(41.158656 271.83923)">continuous thresholds, interval diagnostics, and leave-one-out influence</text>
    <text style="font-size: 6.85px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif" transform="translate(41.158656 279.682079)">Right: archive-order trace correlation and AR(1) scenarios;</text>
    <text style="font-size: 6.85px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif" transform="translate(41.158656 287.493353)">peak registration, 200-row boundary, balanced resampling, and Hampel-type rule</text>
    <text style="font-size: 6.85px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif" transform="translate(41.158656 295.326034)">Boundary: within-session relative distinguishability; no extrapolation</text>
    <text style="font-size: 6.85px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif" transform="translate(41.158656 303.168883)">to all techniques, populations, days, or racket sports</text>
   </g>
