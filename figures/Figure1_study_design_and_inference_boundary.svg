   <g id="text_1">
    <text style="font-weight: 700; font-size: 7.8px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; text-anchor: start" x="28.066896" y="36.239913" transform="rotate(-0 28.066896 36.239913)">Data hierarchy</text>
   </g>
   <g id="text_2">
    <text style="font-size: 7.2px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif" transform="translate(28.066896 54.644729)">30 athlete codes (inference units)</text>
    <text style="font-size: 7.2px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif" transform="translate(28.066896 62.888307)">6 fixed English action labels</text>
    <text style="font-size: 7.2px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif" transform="translate(28.066896 71.140885)">50 archived trials per cell</text>
    <text style="font-size: 7.2px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif" transform="translate(28.066896 79.417651)">9,000 paired coordinate files</text>
   </g>
   <g id="text_3">
    <text style="font-weight: 700; font-size: 7.8px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; text-anchor: start" x="139.346856" y="36.239913" transform="rotate(-0 139.346856 36.239913)">Archive audit</text>
   </g>
   <g id="text_4">
    <text style="font-size: 7.2px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif" transform="translate(139.346856 54.686917)">Collapsed 50 duplicated 400-row blocks</text>
    <text style="font-size: 7.2px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif" transform="translate(139.346856 62.85512)">190 body trials contain structural zeros</text>
    <text style="font-size: 7.2px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif" transform="translate(139.346856 71.131885)">1,180 nominal lengths exceed 200 frames</text>
    <text style="font-size: 7.2px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif" transform="translate(139.346856 79.417651)">Codes 31–40 quarantined</text>
   </g>
   <g id="text_5">
    <text style="font-weight: 700; font-size: 7.8px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; text-anchor: start" x="276.810336" y="36.239913" transform="rotate(-0 276.810336 36.239913)">Operational waveforms without event registration</text>
   </g>
   <g id="text_6">
    <text style="font-size: 7.2px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif" transform="translate(276.810336 54.686917)">Racket: framewise 3-D centroid displacement</text>
    <text style="font-size: 7.2px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif" transform="translate(276.810336 62.844432)">Body: mean displacement across available joints</text>
    <text style="font-size: 7.2px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif" transform="translate(276.810336 71.134135)">Observed segment normalized to 200 nodes</text>
    <text style="font-size: 7.2px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif" transform="translate(276.810336 79.375463)">Not face angle, centre of mass, or coordination</text>
   </g>
   <g id="text_7">
    <text style="font-weight: 700; font-size: 7.8px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; text-anchor: start" x="45.522576" y="146.339973" transform="rotate(-0 45.522576 146.339973)">Contextual decomposition of six fixed labels</text>
   </g>
   <g id="text_8">
    <text style="font-size: 7.2px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif" transform="translate(45.522576 164.743102)">Finite-set action contrast dispersion</text>
    <text style="font-size: 7.2px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif" transform="translate(45.522576 173.703867)">+ athlete + athlete × fixed action</text>
    <text style="font-size: 7.2px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif" transform="translate(45.522576 181.231945)">+ within-cell unexplained variation (descriptive)</text>
   </g>
   <g id="text_9">
    <text style="font-weight: 700; font-size: 7.8px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; text-anchor: start" x="259.354656" y="146.339973" transform="rotate(-0 259.354656 146.339973)">Twelve action-specific design models</text>
   </g>
